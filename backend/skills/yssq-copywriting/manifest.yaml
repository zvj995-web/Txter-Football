name: yssq-copywriting
title: 弈神说球 · Data Sniper 文案
type: copywriting
ip: yssq
description: >
  "狗庄狙击手" persona — 冷数据 + 市井气隐喻，拆解主流足球迷思。
  适合短视频口播脚本，口语化、有网感、带锋芒。
model: deepseek-v4-pro
temperature: 0.7
constraints:
  - key: strict
    label: 严格参考模式
    prompt: >
      你必须严格基于【参考素材/选题】提供的信息进行写作。
      只展开不编造，绝不引用素材中没有的数据或事实。
      如果素材信息不足，深度拆解现有事实而非假装有更多数据。
  - key: creative
    label: 知识发挥模式
    prompt: >
      你可以在【参考素材/选题】基础上调用你的足球知识进行补充和扩展。
      允许引用行业常识、历史类比、战术通识来丰富论述，
      但不能编造具体比赛数据。
target_lengths: [500, 800, 1200, 1500]
